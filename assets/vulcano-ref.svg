<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="VULCANO — estructuras metálicas y soldadura">
  <defs>
    <linearGradient id="u-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12100e"/>
      <stop offset="0.65" stop-color="#1c1712"/>
      <stop offset="1" stop-color="#241a10"/>
    </linearGradient>
    <linearGradient id="u-steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a5f66"/>
      <stop offset="0.5" stop-color="#8b929c"/>
      <stop offset="1" stop-color="#4c5158"/>
    </linearGradient>
    <linearGradient id="u-steel-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#767c85"/>
      <stop offset="1" stop-color="#43474d"/>
    </linearGradient>
    <radialGradient id="u-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6d8" stop-opacity="1"/>
      <stop offset="0.25" stop-color="#ffcf5e" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#ff7a1a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo taller -->
  <rect width="800" height="600" fill="url(#u-bg)"/>
  <rect width="800" height="600" fill="#ff6a00" opacity="0.04"/>

  <!-- Estructura: cercha de acero -->
  <g>
    <!-- cordón inferior -->
    <rect x="60" y="430" width="680" height="26" fill="url(#u-steel)"/>
    <rect x="60" y="430" width="680" height="5" fill="#a9b0ba" opacity="0.8"/>
    <!-- cordón superior inclinado -->
    <g transform="rotate(-8 400 300)">
      <rect x="60" y="240" width="680" height="24" fill="url(#u-steel)"/>
      <rect x="60" y="240" width="680" height="5" fill="#a9b0ba" opacity="0.8"/>
    </g>
    <!-- diagonales y montantes -->
    <g fill="url(#u-steel-v)">
      <rect x="130" y="292" width="18" height="140" transform="skewX(0)"/>
      <polygon points="148,292 260,430 240,430 130,300"/>
      <rect x="250" y="278" width="18" height="154"/>
      <polygon points="268,278 380,430 360,430 250,288"/>
      <rect x="370" y="262" width="18" height="170"/>
      <polygon points="388,262 500,430 480,430 370,272"/>
      <rect x="490" y="246" width="18" height="186"/>
      <polygon points="508,246 620,430 600,430 490,258"/>
      <rect x="610" y="230" width="18" height="202"/>
    </g>
    <!-- pernos -->
    <g fill="#c9d0da">
      <circle cx="139" cy="424" r="3.4"/><circle cx="259" cy="424" r="3.4"/>
      <circle cx="379" cy="424" r="3.4"/><circle cx="499" cy="424" r="3.4"/>
      <circle cx="619" cy="424" r="3.4"/>
      <circle cx="139" cy="300" r="3.4"/><circle cx="259" cy="286" r="3.4"/>
      <circle cx="379" cy="270" r="3.4"/><circle cx="499" cy="254" r="3.4"/>
      <circle cx="619" cy="238" r="3.4"/>
    </g>
  </g>

  <!-- Columna H a la izquierda -->
  <g>
    <rect x="84" y="150" width="14" height="300" fill="url(#u-steel-v)"/>
    <rect x="66" y="150" width="50" height="12" fill="url(#u-steel)"/>
    <rect x="66" y="438" width="50" height="12" fill="url(#u-steel)"/>
  </g>

  <!-- Punto de soldadura: resplandor -->
  <circle cx="500" cy="424" r="90" fill="url(#u-glow)"/>
  <circle cx="500" cy="424" r="14" fill="#fff8e0"/>

  <!-- Soplete -->
  <g transform="rotate(35 500 424)">
    <rect x="510" y="416" width="90" height="16" rx="4" fill="#2b2e33" stroke="#565b63" stroke-width="1.5"/>
    <rect x="596" y="412" width="26" height="24" rx="4" fill="#3a3e45"/>
    <rect x="500" y="420" width="14" height="8" fill="#7c828c"/>
  </g>

  <!-- Chispas -->
  <g stroke-linecap="round">
    <g stroke="#ffd76a" stroke-width="3">
      <path d="M500 424 l58 -66"/><path d="M500 424 l-52 -58"/>
      <path d="M500 424 l74 -18"/><path d="M500 424 l-78 -8"/>
      <path d="M500 424 l40 -90"/>
    </g>
    <g stroke="#ff8c2a" stroke-width="2.2">
      <path d="M500 424 l92 -40"/><path d="M500 424 l-88 -34"/>
      <path d="M500 424 l24 -108"/><path d="M500 424 l-30 -96"/>
      <path d="M500 424 l108 -12"/><path d="M500 424 l64 -78"/>
    </g>
    <g fill="#ffcf5e" stroke="none">
      <circle cx="586" cy="342" r="3"/><circle cx="430" cy="352" r="2.6"/>
      <circle cx="606" cy="380" r="2.4"/><circle cx="548" cy="322" r="2.2"/>
      <circle cx="398" cy="384" r="2.4"/><circle cx="612" cy="410" r="2.8"/>
      <circle cx="524" cy="308" r="2"/><circle cx="462" cy="326" r="2.2"/>
    </g>
    <g fill="#ff7a1a" stroke="none" opacity="0.9">
      <circle cx="632" cy="356" r="2"/><circle cx="372" cy="402" r="2"/>
      <circle cx="576" cy="300" r="1.8"/><circle cx="418" cy="318" r="1.8"/>
      <circle cx="648" cy="416" r="2.2"/>
    </g>
  </g>

  <!-- Piso -->
  <rect x="0" y="456" width="800" height="144" fill="#0c0a08"/>
  <path d="M0 456 h800" stroke="#3a2c1c" stroke-width="2"/>
  <ellipse cx="500" cy="470" rx="150" ry="14" fill="#ff6a00" opacity="0.22"/>

  <!-- Placa de identificación -->
  <g transform="translate(80,496)">
    <rect width="252" height="66" fill="#17140f" stroke="#ff8c2a" stroke-width="1.5"/>
    <rect x="6" y="6" width="240" height="54" fill="none" stroke="#5a4a30" stroke-width="1"/>
    <text x="22" y="34" fill="#ffb35c" font-family="monospace" font-size="24" font-weight="bold" letter-spacing="4">VULCANO</text>
    <text x="22" y="52" fill="#9a8360" font-family="monospace" font-size="10" letter-spacing="2">ESTRUCTURAS METÁLICAS</text>
    <circle cx="228" cy="18" r="4" fill="none" stroke="#ff8c2a" stroke-width="1.2"/>
    <circle cx="228" cy="48" r="4" fill="none" stroke="#ff8c2a" stroke-width="1.2"/>
  </g>

  <!-- Cordón de soldadura decorativo -->
  <g stroke="#ffb35c" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M560 528 q6 -7 12 0 q6 7 12 0 q6 -7 12 0 q6 7 12 0 q6 -7 12 0 q6 7 12 0 q6 -7 12 0 q6 7 12 0 q6 -7 12 0 q6 7 12 0"/>
  </g>
</svg>
